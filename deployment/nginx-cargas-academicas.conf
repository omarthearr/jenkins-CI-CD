# Reverse proxy de la app Django (produccion).
# Ubicacion en el server: /etc/nginx/sites-available/cargasdeployment2025
# El bloque 443 (TLS) lo genera/gestiona certbot automaticamente.
#
# Dominio: cargas-academicas.formabelleza.com  ->  contenedor app en 127.0.0.1:8000

server {
    listen 80;
    server_name cargas-academicas.formabelleza.com formabelleza.com www.formabelleza.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8000/media/;
    }

    # certbot agrega aqui: listen 443 ssl; ssl_certificate ...; y el redirect 80->443
}
